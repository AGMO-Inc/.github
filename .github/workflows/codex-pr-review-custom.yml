name: Codex PR Review - Custom (Reusable)

on:
  workflow_call:
    inputs:
      model:
        description: "Model name for review (leave empty to use gpt-5.2-codex)"
        required: false
        type: string
        default: "gpt-5.2-codex"
      max_diff_bytes:
        description: "Limit diff size to avoid huge payloads"
        required: false
        type: number
        default: 180000
    secrets:
      CODEX_API_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch PR refs for local inspection
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "${{ github.event.pull_request.base.ref }}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head"

      - name: Fetch changed files summary
        id: changed_files
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_DIFF_BYTES: ${{ inputs.max_diff_bytes }}
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          repo="$(echo "${{ github.repository }}" | cut -d/ -f2)"
          pr="${{ github.event.pull_request.number }}"

          curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner}/${repo}/pulls/${pr}/files?per_page=100" \
            > pr_files.json

          python - <<'PY'
          import json
          import os

          max_bytes = int(os.environ.get("MAX_DIFF_BYTES", "180000"))

          with open("pr_files.json", "r", encoding="utf-8") as handle:
            files = json.load(handle)

          total_add = 0
          total_del = 0
          lines = []
          for item in files:
            filename = item.get("filename", "")
            status = item.get("status", "modified")
            additions = int(item.get("additions", 0) or 0)
            deletions = int(item.get("deletions", 0) or 0)
            changes = int(item.get("changes", additions + deletions) or 0)
            total_add += additions
            total_del += deletions
            lines.append(f"- [{status}] {filename} (+{additions} -{deletions}, ~{changes})")

          body = "\n".join([
            "Changed files (summary):",
            f"- count: {len(files)}",
            f"- additions: {total_add}",
            f"- deletions: {total_del}",
            "",
            *lines,
            "",
          ])

          truncated = False
          encoded = body.encode("utf-8")
          if len(encoded) > max_bytes:
            body = encoded[:max_bytes].decode("utf-8", errors="ignore")
            body = body.rsplit("\n", 1)[0] + "\n...[truncated]\n"
            truncated = True

          with open("pr_files_summary.md", "w", encoding="utf-8") as out:
            out.write(body)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"truncated={'true' if truncated else 'false'}\n")
            out.write(f"file_count={len(files)}\n")
          PY


      - name: Fetch previous review comments
        id: previous_reviews
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_FULL: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          repo="$(echo "${{ github.repository }}" | cut -d/ -f2)"
          pr="${{ github.event.pull_request.number }}"

          curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner}/${repo}/issues/${pr}/comments?per_page=100" \
            > pr_comments.json

          python - <<'PY'
          import json
          import os

          max_bytes = 12000

          with open("pr_comments.json", "r", encoding="utf-8") as f:
            comments = json.load(f)

          reviews = []
          for c in comments:
            user = c.get("user", {}).get("login", "")
            body = c.get("body", "")
            created = c.get("created_at", "")
            if "## 요약" in body and ("[bot]" in user or "bot" in user.lower()):
              reviews.append({"created_at": created, "body": body})

          with open("previous_reviews.md", "w", encoding="utf-8") as out:
            if not reviews:
              out.write("이전 AI 리뷰 코멘트: 없음\n")
            else:
              out.write(f"이전 AI 리뷰 코멘트: {len(reviews)}건\n\n")
              total_bytes = 0
              for i, r in enumerate(reviews, 1):
                entry = f"--- 이전 리뷰 #{i} ({r['created_at']}) ---\n{r['body']}\n\n"
                entry_bytes = len(entry.encode('utf-8'))
                if total_bytes + entry_bytes > max_bytes:
                  out.write(f"...[이전 리뷰 {len(reviews) - i + 1}건 생략 (크기 제한)]\n")
                  break
                out.write(entry)
                total_bytes += entry_bytes
          PY

      - name: Build Codex prompt and schema
        id: prompt
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_FULL: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          FILES_SUMMARY_TRUNCATED: ${{ steps.changed_files.outputs.truncated }}
        run: |
          set -euo pipefail

          cat > codex_prompt.md <<'EOF'
          당신은 프로젝트의 시니어 코드 리뷰어다.

          ## 커스텀 리뷰 기준 (5 x 20 = 100)

          ### 1. 요구사항 및 정확성 (0-20)
          - 변경 사항이 PR 설명과 요구사항을 정확히 충족해야 한다.
          - 엣지 케이스와 실패 흐름을 누락 없이 처리해야 한다.
          - API/인터페이스 계약이 깨지지 않아야 한다.
          - 명백한 버그/런타임 오류 가능성이 없어야 한다.

          ### 2. 코드 품질 및 유지보수성 (0-20)
          - 코드가 읽기 쉽고 프로젝트 컨벤션을 따라야 한다.
          - 함수/클래스 책임이 명확하고 과도하게 섞이지 않아야 한다.
          - 중복/죽은 코드/불필요한 복잡도가 없어야 한다.
          - 타입/에러 처리가 일관되고 안전해야 한다.

          ### 3. 보안 및 개인정보 (0-20)
          - 비밀값, 토큰, 인증정보 하드코딩이 없어야 한다.
          - 입력 검증 및 권한 검사가 적절히 적용되어야 한다.
          - 로그/에러/응답에 민감정보가 노출되지 않아야 한다.
          - 인젝션/XSS/CSRF 등 주요 보안 위험이 통제되어야 한다.

          ### 4. 성능 및 안정성 (0-20)
          - 병목 가능성이 큰 연산/쿼리가 합리적으로 최적화되어야 한다.
          - 리소스 정리, 타임아웃, 재시도 등 안정성 고려가 있어야 한다.
          - 불필요한 동기/블로킹 작업이 없어야 한다.
          - 장애 상황에서 예측 가능한 동작을 해야 한다.

          ### 5. 테스트 및 운영성 (0-20)
          - 변경 영향을 다루는 테스트가 적절히 포함/갱신되어야 한다.
          - 모니터링/로깅/디버깅 관점의 운영성이 확보되어야 한다.
          - 설정/환경 변수 변경이 명확히 관리되어야 한다.
          - 배포 후 회귀 위험을 줄이는 장치가 있어야 한다.

          ## 변경사항 확인 방식 (필수)
          - 전체 패치 텍스트는 제공되지 않는다.
          - 반드시 체크아웃된 저장소에서 직접 변경사항을 확인한다.
          - 우선 `git diff --name-only HEAD^1..HEAD`로 변경 파일 목록을 확인한다.
          - 필요한 파일에 한해 `git diff HEAD^1..HEAD -- <path>`와 파일 내용을 조회한다.
          - 아래 요약된 파일 목록과 직접 조회 결과가 다르면 직접 조회 결과를 우선한다.


          ## 이전 리뷰 참고 (필수)
          - 이 PR에 대해 이전에 작성된 AI 리뷰 코멘트가 아래에 포함될 수 있다.
          - 이전 리뷰에서 지적된 문제가 현재 변경사항에서 해결되었는지 반드시 확인한다.
          - 해결된 문제는 해당 카테고리에서 긍정적으로 언급한다.
          - 여전히 해결되지 않은 문제는 다시 지적하되, "이전 리뷰에서도 지적됨"을 명시한다.
          - 이전 리뷰가 없으면 이 섹션을 무시한다.

          ---

          ## 출력 형식 (필수)

          아래 형식을 반드시 그대로 따른다.
          계층은 Markdown 헤더를 사용한다: H2(`##`) > H3(`###`).

          ```markdown
          ## 요약
          - 총점: {5개 점수 합계}/100
          - 판정: {합격 (🟢 O) if 총점 >= 80, 불합격 (🔴 X) if 총점 < 80}
          - 총평: {전체 평가 1~2문장}

          ## 1. 요구사항 및 정확성
          ### 점수
          점수: {number}/20
          ### 문제
          - {문제 설명}
          ### 해결 방법
          - {해결 방안}
          ### 예시
          ```text
          {코드 예시 또는 "해당 없음"}
          ```

          ## 2. 코드 품질 및 유지보수성
          ### 점수
          점수: {number}/20
          ### 문제
          - {문제 설명}
          ### 해결 방법
          - {해결 방안}
          ### 예시
          ```text
          {코드 예시 또는 "해당 없음"}
          ```

          ## 3. 보안 및 개인정보
          ### 점수
          점수: {number}/20
          ### 문제
          - {문제 설명}
          ### 해결 방법
          - {해결 방안}
          ### 예시
          ```text
          {코드 예시 또는 "해당 없음"}
          ```

          ## 4. 성능 및 안정성
          ### 점수
          점수: {number}/20
          ### 문제
          - {문제 설명}
          ### 해결 방법
          - {해결 방안}
          ### 예시
          ```text
          {코드 예시 또는 "해당 없음"}
          ```

          ## 5. 테스트 및 운영성
          ### 점수
          점수: {number}/20
          ### 문제
          - {문제 설명}
          ### 해결 방법
          - {해결 방안}
          ### 예시
          ```text
          {코드 예시 또는 "해당 없음"}
          ```
          ```

          ### 규칙
          1. 각 점수는 0~20의 정수만 사용한다.
          2. 총점은 5개 점수의 정확한 합이어야 한다.
          3. 판정은 반드시 `합격 (🟢 O)` 또는 `불합격 (🔴 X)`만 사용한다.
          4. 각 카테고리의 `### 문제`는 bullet 기준 0~3개까지 작성한다.
          5. 문제가 없으면 `- 없음` 한 줄만 작성한다.
          6. 각 카테고리는 `### 점수`, `### 문제`, `### 해결 방법`, `### 예시`를 모두 포함한다.
          7. 5개 카테고리 H2 제목은 반드시 번호를 포함한다 (`## 1. 요구사항 및 정확성` ~ `## 5. 테스트 및 운영성`).
          8. 요약의 `총점`, `판정`, `총평`은 반드시 `- ` 리스트 형태로 작성한다.
          9. 문제/해결 방법은 가능한 경우 파일 경로와 라인 정보를 포함한다 (`path:line`).
          10. 설명은 한국어로 작성한다.
          EOF

          python - <<'PY'
          import json
          import os
          import urllib.request

          repo_full = os.environ.get("REPO_FULL", "")
          owner, repo = repo_full.split("/", 1)
          pr_number = int(os.environ["PR_NUMBER"])
          token = os.environ.get("GH_TOKEN", "")
          pr_body = (os.environ.get("PR_BODY") or "").strip()
          if not pr_body:
            pr_body = "None"
          elif len(pr_body) > 4000:
            pr_body = pr_body[:4000] + "\n...[truncated]"

          query = """
          query($owner: String!, $repo: String!, $number: Int!) {
            repository(owner: $owner, name: $repo) {
              pullRequest(number: $number) {
                closingIssuesReferences(first: 10) {
                  nodes {
                    number
                    title
                    url
                    state
                    bodyText
                  }
                }
              }
            }
          }
          """

          issue_nodes = []
          issue_lookup_error = ""
          try:
            req_body = json.dumps(
              {
                "query": query,
                "variables": {"owner": owner, "repo": repo, "number": pr_number},
              }
            ).encode("utf-8")
            req = urllib.request.Request(
              "https://api.github.com/graphql",
              data=req_body,
              headers={
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json",
                "Accept": "application/vnd.github+json",
              },
              method="POST",
            )
            with urllib.request.urlopen(req, timeout=20) as resp:
              payload = json.loads(resp.read().decode("utf-8", errors="replace"))
            issue_nodes = (
              payload.get("data", {})
              .get("repository", {})
              .get("pullRequest", {})
              .get("closingIssuesReferences", {})
              .get("nodes", [])
              or []
            )
          except Exception as exc:
            issue_lookup_error = str(exc)

          def one_line(text: str, limit: int) -> str:
            compact = " ".join((text or "").split())
            if not compact:
              return "N/A"
            if len(compact) > limit:
              return compact[:limit] + "..."
            return compact

          with open("pr_context.md", "w", encoding="utf-8") as out:
            out.write("PR body:\n")
            out.write(pr_body + "\n\n")
            out.write("Linked issues:\n")
            if issue_nodes:
              for node in issue_nodes:
                number = node.get("number")
                state = one_line(node.get("state", ""), 30)
                title = one_line(node.get("title", ""), 200)
                url = one_line(node.get("url", ""), 400)
                body = one_line(node.get("bodyText", ""), 240)
                out.write(f"- #{number} [{state}] {title} ({url})\n")
                out.write(f"  Context: {body}\n")
            else:
              if issue_lookup_error:
                out.write(f"- None (lookup failed: {one_line(issue_lookup_error, 160)})\n")
              else:
                out.write("- None\n")
          PY

          {
            echo ""
            echo "---"
            echo "PR number: ${PR_NUMBER}"
            echo "PR title: ${PR_TITLE}"
            echo "PR author: ${PR_AUTHOR}"
            echo "Changed files summary truncated: ${FILES_SUMMARY_TRUNCATED}"
            echo ""
            echo "PR body and linked issues:"
          } >> codex_prompt.md
          cat pr_context.md >> codex_prompt.md
          {
            echo ""
            echo "Changed files summary:"
          } >> codex_prompt.md
          cat pr_files_summary.md >> codex_prompt.md
          {
            echo ""
            echo "Workspace inspection reminder:"
            echo "- Review ONLY PR-introduced changes by inspecting local git/file context."
            echo "- Do not assume unchanged files are modified."
          } >> codex_prompt.md

          {
            echo ""
            echo "Previous AI review comments:"
          } >> codex_prompt.md
          cat previous_reviews.md >> codex_prompt.md

      - name: Run Codex with selected model
        id: codex_model
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.CODEX_API_TOKEN }}
          prompt-file: codex_prompt.md
          model: ${{ inputs.model || 'gpt-5.2-codex' }}
          sandbox: read-only
          safety-strategy: drop-sudo
          allow-bots: true

      - name: Run Codex with auto-selected model
        id: codex_auto
        if: ${{ steps.codex_model.outcome != 'success' }}
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.CODEX_API_TOKEN }}
          prompt-file: codex_prompt.md
          sandbox: read-only
          safety-strategy: drop-sudo
          allow-bots: true

      - name: Prepare review output
        id: call
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex_auto.outputs.final-message || steps.codex_model.outputs.final-message }}
          CODEX_OUTCOME: ${{ steps.codex_auto.outcome || steps.codex_model.outcome || 'failure' }}
          CODEX_MODEL_OUTCOME: ${{ steps.codex_model.outcome || 'skipped' }}
          CODEX_AUTO_OUTCOME: ${{ steps.codex_auto.outcome || 'skipped' }}
          REQUESTED_MODEL: ${{ inputs.model || 'gpt-5.2-codex' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os, re

          raw = os.environ.get("CODEX_FINAL_MESSAGE") or ""
          outcome = os.environ.get("CODEX_OUTCOME") or ""
          model_outcome = os.environ.get("CODEX_MODEL_OUTCOME") or ""
          auto_outcome = os.environ.get("CODEX_AUTO_OUTCOME") or ""
          requested_model = os.environ.get("REQUESTED_MODEL") or ""
          run_url = os.environ.get("RUN_URL") or ""

          def fallback(reason: str) -> str:
            reason = reason.strip().replace("\n", " ")
            return "\n".join([
              "## 요약",
              "- 총점: 0/100",
              "- 판정: 불합격 (🔴 X)",
              "- 총평: Codex 리뷰 결과를 생성하지 못했습니다.",
              "",
              "## 1. 요구사항 및 정확성",
              "### 점수",
              "점수: 0/20",
              "### 문제",
              f"- {reason}",
              "### 해결 방법",
              "- 해당 없음",
              "### 예시",
              "```text",
              "해당 없음",
              "```",
              "",
              "## 2. 코드 품질 및 유지보수성",
              "### 점수",
              "점수: 0/20",
              "### 문제",
              "- 없음",
              "### 해결 방법",
              "- 해당 없음",
              "### 예시",
              "```text",
              "해당 없음",
              "```",
              "",
              "## 3. 보안 및 개인정보",
              "### 점수",
              "점수: 0/20",
              "### 문제",
              "- 없음",
              "### 해결 방법",
              "- 해당 없음",
              "### 예시",
              "```text",
              "해당 없음",
              "```",
              "",
              "## 4. 성능 및 안정성",
              "### 점수",
              "점수: 0/20",
              "### 문제",
              "- 없음",
              "### 해결 방법",
              "- 해당 없음",
              "### 예시",
              "```text",
              "해당 없음",
              "```",
              "",
              "## 5. 테스트 및 운영성",
              "### 점수",
              "점수: 0/20",
              "### 문제",
              "- 없음",
              "### 해결 방법",
              "- 해당 없음",
              "### 예시",
              "```text",
              "해당 없음",
              "```",
              "",
            ])

          def is_valid_template(s: str) -> tuple[bool, str]:
            required_h2 = [
              "요약",
              "1. 요구사항 및 정확성",
              "2. 코드 품질 및 유지보수성",
              "3. 보안 및 개인정보",
              "4. 성능 및 안정성",
              "5. 테스트 및 운영성",
            ]
            for section in required_h2:
              if f"## {section}" not in s:
                return False, f"Missing H2 section: {section}"

            score_re = re.compile(r"^점수:\s*(\d{1,2})/20\s*$", re.MULTILINE)
            scores = [int(x) for x in score_re.findall(s)]
            if len(scores) < 5:
              return False, f"Expected 5 점수 lines, found {len(scores)}"
            scores = scores[:5]
            if any(x < 0 or x > 20 for x in scores):
              return False, "Score out of range"

            m_total = re.search(r"^- 총점:\s*(\d{1,3})/100\s*$", s, re.MULTILINE)
            if not m_total:
              return False, "Missing 총점 line"
            total = int(m_total.group(1))
            if total != sum(scores):
              return False, f"총점 mismatch (got {total}, expected {sum(scores)})"

            m_verdict = re.search(r"^- 판정:\s*(합격|불합격)\s*\(([^)]+)\)\s*$", s, re.MULTILINE)
            if not m_verdict:
              return False, "Missing 판정 line"
            verdict = m_verdict.group(1)
            marker = m_verdict.group(2).strip()
            expected = "합격" if total >= 80 else "불합격"
            if verdict != expected:
              return False, f"판정 mismatch (got {verdict}, expected {expected})"
            expected_marker = "🟢 O" if expected == "합격" else "🔴 X"
            if marker != expected_marker:
              return False, f"판정 marker mismatch (got {marker}, expected {expected_marker})"

            if not re.search(r"^- 총평:\s*.+$", s, re.MULTILINE):
              return False, "Missing 총평 line"

            section_names = [
              "1. 요구사항 및 정확성",
              "2. 코드 품질 및 유지보수성",
              "3. 보안 및 개인정보",
              "4. 성능 및 안정성",
              "5. 테스트 및 운영성",
            ]
            for section in section_names:
              m_section = re.search(
                rf"## {re.escape(section)}\n(?P<body>.*?)(?=\n## |\Z)",
                s,
                re.DOTALL,
              )
              if not m_section:
                return False, f"Missing section body: {section}"
              body = m_section.group("body")
              for required_h3 in ["### 점수", "### 문제", "### 해결 방법", "### 예시"]:
                if required_h3 not in body:
                  return False, f"Missing {required_h3} in {section}"

              try:
                issues_part = body.split("### 문제\n", 1)[1].split("\n### 해결 방법", 1)[0]
              except Exception:
                return False, f"Cannot parse 문제 block in {section}"

              issue_lines = [ln.strip() for ln in issues_part.splitlines() if ln.strip().startswith("- ")]
              if not issue_lines:
                return False, f"문제 bullet missing in {section}"
              if issue_lines == ["- 없음"]:
                pass
              else:
                if any(ln == "- 없음" for ln in issue_lines):
                  return False, f"문제 block mixes '없음' with other issues in {section}"
                if len(issue_lines) > 3:
                  return False, f"문제 bullet count exceeds 3 in {section}"

            return True, ""

          if not raw.strip():
            if requested_model:
              reason = f"Codex produced no output. requested_model={requested_model}, model_outcome={model_outcome}, auto_outcome={auto_outcome}, outcome={outcome}. Logs: {run_url}"
            else:
              reason = f"Codex produced no output. auto_outcome={auto_outcome}, outcome={outcome}. Logs: {run_url}"
            out = fallback(reason)
            ok = False
          else:
            valid, why = is_valid_template(raw)
            if not valid:
              out = fallback(f"Codex output invalid: {why}. Logs: {run_url}")
              ok = False
            else:
              out = raw.strip() + "\n"
              ok = True

          open("comment.md", "w", encoding="utf-8").write(out)
          open(os.environ.get("GITHUB_OUTPUT"), "a", encoding="utf-8").write(f"api_ok={'true' if ok else 'false'}\n")
          PY

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          repo="$(echo "${{ github.repository }}" | cut -d/ -f2)"
          pr="${{ github.event.pull_request.number }}"

          python - <<'PY' > body.json
          import json
          body = open("comment.md", "r", encoding="utf-8", errors="replace").read()
          print(json.dumps({"body": body}))
          PY

          curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d @body.json \
            "https://api.github.com/repos/${owner}/${repo}/issues/${pr}/comments" \
            > /dev/null

      - name: Fail job if Codex failed
        if: ${{ steps.call.outputs.api_ok != 'true' }}
        run: |
          set -euo pipefail
          echo "Codex review failed. See the PR comment and job logs for details." >&2
          exit 1
