name: 기능 개발 - 하위 태스크
description: 기능 개발에 대한 하위 태스크
title: "[Task] {상위 기능 제목} - 하위 태스크 요약"
labels: []
assignees: []
type: Task
body:
  - type: input
    id: parent_feature
    attributes:
      label: 상위 Feature
      description: 상위 Feature 이슈 번호를 입력하세요.
      placeholder: "ex. #123"
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: 1. 작업 요약
      placeholder: "ex. 디바이스 소유권 테이블 스키마 설계"
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 2. 체크리스트
      description: 작업 항목을 체크박스로 작성하세요.
      value: |
        - [ ] API 개발...
        - [ ] 테스트 케이스 작성 ...
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 3. 참고 (선택)
      placeholder: |
        - 링크/스크린샷/로그 등
    validations:
      required: false

  - type: textarea
    id: detailed_acceptance_criteria
    attributes:
      label: 4. 상세 수용 기준 (선택)
      description: 필요한 경우 Given/When/Then 형식으로 작성하세요.
      placeholder: |
        - Given ...
        - When ...
        - Then ...
    validations:
      required: false

  - type: textarea
    id: verification_logs
    attributes:
      label: 5. 검증 로그/링크 (선택)
      description: 테스트 결과, 스크린샷, 로그 링크를 정리하세요.
      placeholder: |
        - 테스트 결과:
        - 스크린샷:
        - 로그 링크:
    validations:
      required: false
